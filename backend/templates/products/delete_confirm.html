{% extends 'base.html' %}
{% block title %}Remove Product — AkShopOnline{% endblock %}

{% block content %}
<div class="container py-5">
  <div class="row justify-content-center">
    <div class="col-md-5">
      <div class="card border-0 shadow-sm">
        <div class="card-body p-5 text-center">
          <i class="bi bi-exclamation-triangle-fill display-3 text-danger mb-3"></i>
          <h4 class="fw-bold mb-2">Remove Product?</h4>
          <p class="text-muted mb-4">
            Are you sure you want to remove <strong>{{ product.title }}</strong>?
            It will no longer be visible to buyers.
          </p>
          <div class="d-flex gap-3 justify-content-center">
            <form method="post">
              {% csrf_token %}
              <button type="submit" class="btn btn-danger px-4">
                <i class="bi bi-trash me-1"></i>Yes, Remove
              </button>
            </form>
            <a href="{% url 'products:my_products' %}" class="btn btn-outline-secondary px-4">Cancel</a>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>
{% endblock %}
